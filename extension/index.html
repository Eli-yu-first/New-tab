<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="icon" type="image/png" href="icons/icon16.png">

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- ================================================================
       TOP SEARCH BAR — search with Google, Microsoft, or Baidu
       ================================================================ -->
  <div class="top-search-bar" id="topSearchBar" style="position: relative;">
    <div class="search-container">
      <div class="custom-dropdown" id="customSearchDropdown">
        <div class="dropdown-trigger" id="dropdownTrigger">
          <img src="icons/google.png" class="engine-logo" id="currentEngineLogo" alt="">
          <span id="currentEngineText">Google</span>
          <svg class="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
        </div>
        <ul class="dropdown-menu" id="dropdownMenu" style="display: none;">
          <li class="dropdown-item" data-value="google">
            <img src="icons/google.png" class="engine-logo" alt="">
            Google
          </li>
          <li class="dropdown-item" data-value="bing">
            <img src="icons/bing.png" class="engine-logo" alt="">
            Microsoft Bing
          </li>
          <li class="dropdown-item" data-value="baidu">
            <img src="https://www.google.com/s2/favicons?domain=baidu.com&sz=32" class="engine-logo" alt="">
            Baidu
          </li>
        </ul>
      </div>
      <select id="searchEngine" class="search-engine-select" style="display: none;">
        <option value="google">Google</option>
        <option value="bing">Microsoft Bing</option>
        <option value="baidu">Baidu</option>
      </select>
      <input type="text" id="searchInput" class="search-input" placeholder="Search the web..." />
      <button class="search-btn" id="searchBtn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </button>
    </div>
    <div class="section-search" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%);">
      <input type="text" id="tabSearchInput" class="tab-search-input" placeholder="Search tabs..." />
    </div>
  </div>

  <!-- ================================================================
       NEW TAB DUPES BANNER — appears when you have extra New Tab tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> New Tab tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       MAIN CONTENT AREA — three-column layout
       Column 1: Open tabs
       Column 2: Frequently used tabs
       Column 3: Bookmarks
       ================================================================ -->


  <div class="dashboard-columns" id="dashboardColumns">

    <!-- COLUMN 1: Open tabs -->
    <div class="tab-column" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Open tabs</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

    <!-- COLUMN 2: History -->
    <div class="tab-column" id="frequentTabsSection" style="display:none">
      <div class="section-header">
        <h2>History</h2>
        <div class="section-line"></div>
        <div class="section-count" id="frequentTabsCount"></div>
        <button class="history-sort-btn" id="historySortBtn" title="切换排序">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h5.25m5.25 0L17.25 9m0 0L21 13.5m-3.75-4.5V21" />
          </svg>
          <span id="historySortLabel">最新</span>
        </button>
      </div>
      <div class="missions" id="frequentTabsMissions"></div>
    </div>

    <!-- COLUMN 3: Saved for later -->
    <div class="tab-column" id="savedTabsSection" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="savedTabsCount"></div>
        <button class="history-sort-btn" id="savedTabsSortBtn" title="切换排序">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h5.25m5.25 0L17.25 9m0 0L21 13.5m-3.75-4.5V21" />
          </svg>
          <span id="savedTabsSortLabel">最新</span>
        </button>
      </div>
      <div class="missions" id="savedTabsMissions"></div>
    </div>

    <!-- COLUMN 4: Bookmarks -->
    <div class="tab-column" id="bookmarksSection" style="display:none">
      <div class="section-header">
        <h2>Bookmarks</h2>
        <div class="section-line"></div>
        <div class="section-count" id="bookmarksCount"></div>
        <button class="add-bookmark-btn" id="addNewBookmarkBtn" title="Add new bookmark">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
        </button>
      </div>
      <div class="missions" id="bookmarksMissions"></div>
    </div>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats" style="display: flex; align-items: center; gap: 16px;">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
      <div class="data-actions" style="display: flex; gap: 12px; align-items: center; border-left: 1px solid var(--surface-hover); padding-left: 16px;">
        <button id="exportDataBtn" style="background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; text-decoration:underline; text-underline-offset:2px; padding:0; font-family:inherit;">Backup Data</button>
        <button id="importDataBtn" style="background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; text-decoration:underline; text-underline-offset:2px; padding:0; font-family:inherit;">Restore</button>
        <input type="file" id="importDataInput" accept=".json" style="display:none;" />
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/Eli-yu-first/New-tab" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab New</a> by <a href="https://x.com/yueli0681790578?s=21" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Eli</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Custom Bookmark Modal -->
<div id="bookmarkModal" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <h3 style="margin-bottom: 16px; font-family: 'Newsreader', serif; font-weight: 400; font-style: italic; font-size: 20px; color: var(--ink);">Add new bookmark</h3>
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px;">URL</label>
      <input type="text" id="bookmarkModalUrl" class="search-input" style="width: 100%; box-sizing: border-box;" placeholder="https://example.com" />
    </div>
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px;">Title</label>
      <input type="text" id="bookmarkModalTitle" class="search-input" style="width: 100%; box-sizing: border-box;" placeholder="My Bookmark" />
    </div>
    <div style="display: flex; justify-content: flex-end; gap: 8px;">
      <button id="bookmarkModalCancel" class="action-btn">Cancel</button>
      <button id="bookmarkModalSave" class="action-btn primary">Save</button>
    </div>
  </div>
</div>

<!-- Custom Context Menu -->
<div id="custom-context-menu" class="custom-menu" style="display: none; position: absolute; z-index: 9999;">
  <div class="menu-item" id="menu-edit">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="menu-icon"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
    修改书签
  </div>
  <div class="menu-item menu-delete" id="menu-delete">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="menu-icon"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
    删除书签
  </div>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
